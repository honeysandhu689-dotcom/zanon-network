<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zanon Official | $ZNN</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
background:black;
color:white;
font-family:Roboto;
text-align:center;
overflow-x:hidden;
}

/* HERO */

.hero{
padding:120px 20px;
}

.hero h1{
font-family:Orbitron;
font-size:70px;
background:linear-gradient(45deg,#14F195,#9945FF);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SECTIONS */

.section{
max-width:1100px;
margin:auto;
padding:80px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.item{
background:#111;
padding:20px;
border-radius:10px;
border:1px solid #333;
}

.card{
background:#111;
padding:30px;
border-radius:20px;
margin-top:20px;
}

/* BUTTONS */

.buttons{
margin-top:30px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.btn{
padding:15px 30px;
border-radius:50px;
font-family:Orbitron;
text-decoration:none;
font-weight:700;
}

.buy{background:#14F195;color:#000}
.telegram{background:#229ED9;color:#fff}
.twitter{border:2px solid #14F195;color:#14F195}

/* COIN */

#coin3d{
width:250px;
height:250px;
margin:40px auto;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #333;
padding:10px;
}

/* MUSIC */

audio{
position:fixed;
bottom:20px;
right:20px;
z-index:100;
}

/* AI CHAT */

#ai-chat{
position:fixed;
bottom:90px;
right:20px;
width:260px;
background:#111;
border:1px solid #14F195;
border-radius:10px;
padding:15px;
font-size:14px;
text-align:left;
}

#ai-title{
color:#14F195;
font-family:Orbitron;
margin-bottom:10px;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

</style>

</head>

<body>

<canvas id="galaxy"></canvas>

<audio autoplay loop controls muted>
<source src="https://cdn.pixabay.com/download/audio/2023/03/28/audio_5e5c9b1d29.mp3?filename=deep-space-ambient-141714.mp3">
</audio>

<!-- AI GUIDE -->

<div id="ai-chat">

<div id="ai-title">🤖 Zanon AI Guide</div>

<div id="ai-text">
Welcome to the Zanon website.  
$ZNN is a Solana meme token built for community and fast blockchain transactions.
</div>

</div>

<section class="hero">

<h1>$ZNN</h1>

<p>Zanon Solana Meme Token</p>

<div id="coin3d"></div>

<div class="buttons">

<a href="https://pump.fun/coin/ByRVZqQxsZ34MX8Uy7dUwt1V6PBjefNegd84CjgCpump" class="btn buy">Buy</a>

<a href="https://t.me/ZanonZNN" class="btn telegram">Telegram</a>

<a href="https://x.com/honey_sand94082" class="btn twitter">Twitter</a>

<button class="btn buy" onclick="connectWallet()">Connect Phantom</button>

</div>

</section>

<section class="section">

<h2>Pump.fun Direct Swap</h2>

<div class="card">

<iframe
src="https://pump.fun/coin/ByRVZqQxsZ34MX8Uy7dUwt1V6PBjefNegd84CjgCpump"
width="100%"
height="500"
frameborder="0">
</iframe>

</div>

</section>

<section class="section">

<h2>Dexscreener Chart</h2>

<div class="card">

<iframe
src="https://dexscreener.com/solana/byrvzqqxsZ34MX8Uy7dUwt1V6PBjefNegd84CjgCpump?embed=1"
width="100%"
height="400">
</iframe>

</div>

</section>

<section class="section">

<h2>Live Solana Transactions</h2>

<div class="card" id="transactions"></div>

</section>

<section class="section">

<h2>Whale Alerts</h2>

<div class="card" id="whales"></div>

</section>

<script>

/* WALLET */

function connectWallet(){

if(window.solana && window.solana.isPhantom){

window.solana.connect()

}else{

alert("Install Phantom Wallet")

}

}

/* AI GUIDE TEXT */

const aiMessages=[
"Welcome to Zanon crypto ecosystem.",
"$ZNN is built on the Solana blockchain.",
"Use Pump.fun widget to buy ZNN directly.",
"Join Telegram community for updates.",
"Zanon focuses on community driven growth."
]

let aiIndex=0

function rotateAI(){

document.getElementById("ai-text").innerHTML=aiMessages[aiIndex]

aiIndex++

if(aiIndex>=aiMessages.length)aiIndex=0

}

setInterval(rotateAI,8000)

/* TRANSACTIONS */

function transactions(){

let div=document.getElementById("transactions")

div.innerHTML=""

for(let i=0;i<5;i++){

let t=document.createElement("div")

t.innerHTML="🔄 New Solana Transaction Detected"

t.style.padding="10px"

div.appendChild(t)

}

}

transactions()

setInterval(transactions,10000)

/* WHALES */

function whales(){

let div=document.getElementById("whales")

div.innerHTML=""

for(let i=0;i<3;i++){

let w=document.createElement("div")

w.innerHTML="🐋 Whale Wallet Activity Detected"

w.style.padding="10px"

div.appendChild(w)

}

}

whales()

setInterval(whales,15000)

/* 3D COIN */

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(75,1,0.1,1000)

const renderer=new THREE.WebGLRenderer({alpha:true})

renderer.setSize(200,200)

document.getElementById("coin3d").appendChild(renderer.domElement)

const geometry=new THREE.CylinderGeometry(3,3,0.5,32)

const material=new THREE.MeshBasicMaterial({color:0x14F195,wireframe:true})

const coin=new THREE.Mesh(geometry,material)

scene.add(coin)

camera.position.z=6

function animate(){

requestAnimationFrame(animate)

coin.rotation.y+=0.03

renderer.render(scene,camera)

}

animate()

/* GALAXY */

const canvas=document.getElementById("galaxy")

const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<500;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
})

}

function galaxy(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(s=>{

ctx.beginPath()
ctx.arc(s.x,s.y,s.size,0,Math.PI*2)
ctx.fill()

s.y+=0.2

if(s.y>canvas.height)s.y=0

})

requestAnimationFrame(galaxy)

}

galaxy()

</script>

</body>
</html>
