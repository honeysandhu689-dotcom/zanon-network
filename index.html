<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zanon Network (Ž) | 5D Official</title>
    <style>
        :root { --neon: #00f2ff; --mint: #00ff88; --glow: rgba(0, 242, 255, 0.4); }
        
        body { 
            margin: 0; background: radial-gradient(circle at center, #001a1a 0%, #000 100%); 
            color: #fff; font-family: 'Segoe UI', Arial, sans-serif; overflow-x: hidden;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .container { width: 100%; max-width: 900px; padding: 40px 20px; text-align: center; }

        h1 { color: var(--neon); letter-spacing: 10px; font-size: 3rem; text-shadow: 0 0 20px var(--neon); margin: 0; }
        .subtitle { color: #ff00ff; letter-spacing: 3px; font-weight: bold; margin-bottom: 40px; }

        /* MINTED STATUS BOX */
        .status-card {
            background: rgba(0, 255, 136, 0.05); border: 2px solid var(--mint);
            padding: 30px; border-radius: 30px; margin: 20px auto; max-width: 550px;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.2); position: relative;
        }
        .mint-badge { background: var(--mint); color: #000; padding: 5px 20px; border-radius: 50px; font-weight: bold; font-size: 14px; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); }
        
        #coinCount { font-size: 3.5rem; color: #fff; font-family: 'Courier New', monospace; font-weight: bold; text-shadow: 0 0 15px #fff; margin: 15px 0; }

        /* 5D COIN GENERATION (Advanced Animation) */
        .coin-5d-container { 
            margin: 60px auto; width: 280px; height: 280px; position: relative;
            filter: drop-shadow(0 0 40px var(--neon));
        }
        .coin-5d {
            width: 100%; height: auto;
            animation: 
                rotate5D 10s linear infinite,
                float5D 4s ease-in-out infinite,
                pulse5D 2s ease-in-out infinite;
        }

        @keyframes rotate5D {
            0% { transform: rotateY(0deg) rotateX(0deg); }
            50% { transform: rotateY(180deg) rotateX(10deg); }
            100% { transform: rotateY(360deg) rotateX(0deg); }
        }
        @keyframes float5D {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        @keyframes pulse5D {
            0%, 100% { filter: drop-shadow(0 0 30px var(--neon)); }
            50% { filter: drop-shadow(0 0 60px var(--neon)); brightness(1.2); }
        }

        /* BUTTONS */
        .btn-zone { display: flex; justify-content: center; gap: 20px; margin-top: 40px; }
        .btn { padding: 18px 45px; border-radius: 60px; font-weight: bold; text-decoration: none; transition: 0.4s; font-size: 1.1rem; border: none; }
        .buy { background: var(--mint); color: #000; box-shadow: 0 0 25px var(--mint); }
        .sell { background: transparent; border: 2px dashed #ff4b2b; color: #ff4b2b; }
        .btn:hover { transform: scale(1.1) translateY(-5px); filter: brightness(1.2); }

        /* WALLET CARD */
        .wallet-box { background: rgba(0, 0, 0, 0.6); border: 1px solid #333; padding: 25px; border-radius: 20px; margin-top: 50px; }
        code { display: block; word-break: break-all; color: var(--mint); background: #111; padding: 15px; margin-top: 15px; border-radius: 10px; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ZANON NETWORK</h1>
        <p class="subtitle">DECENTRALIZED 5D PROTOCOL ON SOLANA</p>

        <div class="status-card">
            <div class="mint-badge">✓ MINTING COMPLETED</div>
            <div id="coinCount">21,000,000 Ž</div>
            <div style="height: 12px; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #333;">
                <div style="width: 100%; height: 100%; background: linear-gradient(90deg, var(--neon), var(--mint));"></div>
            </div>
            <p style="color: var(--mint); font-weight: bold; margin-top: 15px;">TOTAL SUPPLY FULLY VERIFIED</p>
        </div>

        <div class="coin-5d-container">
            <img src="1772480639212.png" class="coin-5d" alt="Zanon 5D Coin">
        </div>

        <div class="btn-zone">
            <a href="#" class="btn buy">BUY Ž TOKEN</a>
            <a href="#" class="btn sell">EXPLORER</a>
        </div>

        <div class="wallet-box">
            <p style="color: var(--neon); font-weight: bold; margin: 0;">OFFICIAL CONTRACT ADDRESS</p>
            <code>A3paaCBsJmnK6uB2bXs4jAYEwXs9WJarh7mShnu62TdP</code>
        </div>

        <footer style="margin-top: 60px; color: #444; font-size: 13px; letter-spacing: 2px;">
            © 2026 ZANON NETWORK | THE FUTURE OF ASSETS
        </footer>
    </div>

</body>
</html>
