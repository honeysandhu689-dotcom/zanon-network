<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zanon Network (Ž) | Official Bitcoin Protocol on Solana</title>
    <style>
        body { background: radial-gradient(circle, #001a1a 0%, #000 100%); color: #fff; text-align: center; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; scroll-behavior: smooth; }
        
        /* Layout Containers */
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        header { padding: 40px 0; }
        h1 { color: #00f2ff; letter-spacing: 8px; font-size: 3rem; text-shadow: 0 0 20px #00f2ff; margin: 0; }
        .tagline { color: #ff00ff; font-weight: bold; letter-spacing: 2px; margin-top: 10px; }

        /* Mining Tracker Box (Latest Version) */
        .mining-container { background: rgba(0, 242, 255, 0.05); border: 2px solid #00f2ff; padding: 25px; margin: 30px auto; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); position: relative; max-width: 500px; }
        .mining-title { color: #00ff88; font-weight: bold; font-size: 1.1rem; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        .live-dot { height: 12px; width: 12px; background-color: #ff0000; border-radius: 50%; display: inline-block; animation: blink 1s infinite; margin-right: 12px; box-shadow: 0 0 10px #ff0000; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        #coinCount { font-size: 3rem; color: #fff; text-shadow: 0 0 15px #fff; font-family: 'Courier New', monospace; font-weight: bold; margin: 10px 0; }
