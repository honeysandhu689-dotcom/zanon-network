/* star background */

const canvas=document.getElementById("starfield");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.5
});
}

function animateStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(star=>{

ctx.beginPath();
ctx.arc(star.x,star.y,star.size,0,Math.PI*2);
ctx.fill();

star.y+=star.speed;

if(star.y>canvas.height){
star.y=0;
star.x=Math.random()*canvas.width;
}

});

requestAnimationFrame(animateStars);

}

animateStars();

/* supply counter */

let count=0;
let target=1000000000;

let counter=setInterval(function(){

count+=5000000;

document.getElementById("supply").innerText=count.toLocaleString();

if(count>=target){

document.getElementById("supply").innerText="1,000,000,000";

clearInterval(counter);

}

},10);

/* phantom wallet */

function connectWallet(){

if(window.solana){

window.solana.connect();

alert("Phantom Wallet Connected");

}else{

alert("Install Phantom Wallet");

}

}

/* three js coin */

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,1,0.1,1000);
const renderer=new THREE.WebGLRenderer({alpha:true});

renderer.setSize(220,220);

document.getElementById("coin3d").appendChild(renderer.domElement);

const geometry=new THREE.CylinderGeometry(3,3,1,32);
const material=new THREE.MeshBasicMaterial({color:0x14F195,wireframe:true});
const coin=new THREE.Mesh(geometry,material);

scene.add(coin);
camera.position.z=5;

function animate(){

requestAnimationFrame(animate);

coin.rotation.y+=0.02;

renderer.render(scene,camera);

}

animate();

/* mini contra */

const game=document.getElementById("gameCanvas");
const g=game.getContext("2d");

let x=50;

document.addEventListener("keydown",e=>{
if(e.key==="ArrowRight")x+=10;
if(e.key==="ArrowLeft")x-=10;
});

function loop(){

g.clearRect(0,0,600,300);

g.fillStyle="#14F195";
g.fillRect(x,250,20,20);

requestAnimationFrame(loop);

}

loop();
