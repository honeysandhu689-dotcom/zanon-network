<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zanon Official | $ZNN</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: white;
            font-family: Roboto;
            overflow-x: hidden;
            text-align: center;
        }

        /* star background */
        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        /* blockchain animation canvas */
        #blockchain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* hero */
        .hero {
            padding: 80px 20px;
        }

        .hero h1 {
            font-family: Orbitron;
            font-size: 4rem;
            background: linear-gradient(45deg, #14F195, #9945FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 3D coin */
        #coin3d {
            width: 220px;
            height: 220px;
            margin: 40px auto;
        }

        /* buttons */
        .buttons {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .buy {
            background: #14F195;
            color: black;
        }

        .telegram {
            background: #229ED9;
            color: white;
        }

        .twitter {
            border: 1px solid white;
            color: white;
        }

        .wallet {
            background: #9945FF;
            color: white;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px #9945FF;
        }

        /* sections */
        .section {
            max-width: 1100px;
            margin: auto;
            padding: 60px 20px;
        }

        /* animated cards */
        .card {
            background: #111;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            transition: 0.4s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 25px #9945FF;
        }

        /* grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .item {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .item:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #14F195;
        }

        /* leaderboard */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        td,
        th {
            border: 1px solid #333;
            padding: 10px;
        }

        /* contra game */
        #gameCanvas {
            background: black;
            border: 2px solid #14F195;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>
    <canvas id="blockchain"></canvas>

    <section class="hero">
        <h1>$ZNN</h1>
        <p>Zanon Solana Meme Token</p>
        <div id="coin3d"></div>
        <div class="buttons">
            <a href="https://pump.fun/coin/ByRVZqQxsZ34MX8Uy7dUwt1V6PBjefNegd84CjgCpump" class="btn buy" target="_blank">Buy Pump.fun</a>
            <a href="https://t.me/ZanonZNN" class="btn telegram" target="_blank">Telegram</a>
            <a href="https://x.com/honey_sand94082" class="btn twitter" target="_blank">X Twitter</a>
            <button class="btn wallet" onclick="connectWallet()">Connect Phantom</button>
        </div>
    </section>
    <section class="section">
        <h2>Token Info</h2>
        <div class="grid">
            <div class="item">Name: Zanon</div>
            <div class="item">Symbol: $ZNN</div>
            <div class="item">Supply: <span id="supply">0</span></div>
            <div class="item">Network: Solana</div>
        </div>
    </section>
    <section class="section">
        <h2>Dexscreener Chart</h2>
        <div class="card">
            <iframe src="https://dexscreener.com/solana" width="100%" height="400" frameborder="0"></iframe>
        </div>
    </section>
    <section class="section">
        <h2>Crypto Market Charts</h2>
        <div class="card">
            <script src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js">
                {
                    "width": "100%",
                    "height": "400",
                    "symbolsGroups": [{
                        "name": "Crypto",
                        "symbols": [
                            {"name": "BINANCE:BTCUSDT"},
                            {"name": "BINANCE:ETHUSDT"},
                            {"name": "BINANCE:SOLUSDT"}
                        ]
                    }]
                }
            </script>
        </div>
    </section>
    <section class="section">
        <h2>Token Holder Leaderboard</h2>
        <div class="card">
            <table>
                <tr>
                    <th>Rank</th>
                    <th>Wallet</th>
                    <th>Tokens</th>
                </tr>
                <tr>
                    <td>1</td>
                    <td>9xA...21K</td>
                    <td>150M</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>7KJ...8PL</td>
                    <td>90M</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>3LM...7QP</td>
                    <td>50M</td>
                </tr>
            </table>
        </div>
    </section>
    <section class="section">
        <h2>Contra Mini Game</h2>
        <div class="card">
            <canvas id="gameCanvas" width="600" height="300"></canvas>
        </div>
    </section>
    <script>
        /* star background */
        const canvas = document.getElementById("starfield");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let stars = [];

        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5
            });
        }

        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "white";

            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();

                star.y += star.speed;

                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });

            requestAnimationFrame(animateStars);
        }

        animateStars();

        /* blockchain perimeter animation */
        const bcCanvas = document.getElementById("blockchain");
        const bcCtx = bcCanvas.getContext("2d");

        bcCanvas.width = window.innerWidth;
        bcCanvas.height = window.innerHeight;

        const blockSize = 20;
        const numBlocks = 20;
        const perimeter = 2 * (bcCanvas.width + bcCanvas.height);
        const spacing = perimeter / numBlocks;
        let time = 0;
        const speed = 1; // pixels per frame

        function getPositionAlongPerimeter(t) {
            const w = bcCanvas.width;
            const h = bcCanvas.height;
            const pos = t % perimeter;

            if (pos < w) {
                // Top side: left to right
                return { x: pos, y: blockSize / 2, dir: 'horizontal' };
            } else if (pos < w + h) {
                // Right side: top to bottom
                return { x: w - blockSize / 2, y: pos - w + blockSize / 2, dir: 'vertical' };
            } else if (pos < 2 * w + h) {
                // Bottom side: right to left
                return { x: w - (pos - w - h) - blockSize / 2, y: h - blockSize / 2, dir: 'horizontal' };
            } else {
                // Left side: bottom to top
                return { x: blockSize / 2, y: h - (pos - 2 * w - h) - blockSize / 2, dir: 'vertical' };
            }
        }

        function drawBlockchain() {
            bcCtx.clearRect(0, 0, bcCanvas.width, bcCanvas.height);

            bcCtx.fillStyle = '#9945FF';
            bcCtx.strokeStyle = '#14F195';
            bcCtx.lineWidth = 2;

            for (let i = 0; i < numBlocks; i++) {
                const blockPos = (time + i * spacing) % perimeter;
                const { x, y } = getPositionAlongPerimeter(blockPos);

                // Draw block
                bcCtx.fillRect(x - blockSize / 2, y - blockSize / 2, blockSize, blockSize);
                bcCtx.strokeRect(x - blockSize / 2, y - blockSize / 2, blockSize, blockSize);

                // Optional: Draw connection line to next block (simple approximation)
                const nextPos = (time + (i + 1) * spacing) % perimeter;
                const { x: nextX, y: nextY } = getPositionAlongPerimeter(nextPos);
                bcCtx.beginPath();
                bcCtx.moveTo(x, y);
                bcCtx.lineTo(nextX, nextY);
                bcCtx.stroke();
            }

            time += speed;
            requestAnimationFrame(drawBlockchain);
        }

        drawBlockchain();

        /* supply counter */
        let count = 0;
        let target = 1000000000;

        let counter = setInterval(function () {
            count += 5000000;

            document.getElementById("supply").innerText = count.toLocaleString();

            if (count >= target) {
                document.getElementById("supply").innerText = "1,000,000,000";
                clearInterval(counter);
            }
        }, 10);

        /* phantom wallet */
        function connectWallet() {
            if (window.solana) {
                window.solana.connect();
                alert("Phantom Wallet Connected");
            } else {
                alert("Install Phantom Wallet");
            }
        }

        /* three js coin */
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });

        renderer.setSize(220, 220);

        document.getElementById("coin3d").appendChild(renderer.domElement);

        const geometry = new THREE.CylinderGeometry(3, 3, 1, 32);
        const material = new THREE.MeshBasicMaterial({ color: 0x14F195, wireframe: true });
        const coin = new THREE.Mesh(geometry, material);

        scene.add(coin);
        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);

            coin.rotation.y += 0.02;

            renderer.render(scene, camera);
        }

        animate();

        /* mini contra */
        const game = document.getElementById("gameCanvas");
        const g = game.getContext("2d");

        let x = 50;

        document.addEventListener("keydown", e => {
            if (e.key === "ArrowRight") x += 10;
            if (e.key === "ArrowLeft") x -= 10;
        });

        function loop() {
            g.clearRect(0, 0, 600, 300);

            g.fillStyle = "#14F195";
            g.fillRect(x, 250, 20, 20);

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
