<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zanon Network (Ž) | Official</title>

  <!-- BASIC RESET -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #001a1a 0%, #000 70%);
      color: #ffffff;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 24px;
    }

    /* HEADER */
    header {
      padding: 40px 0;
    }

    header h1 {
      color: #00f2ff;
      letter-spacing: 6px;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    header p {
      color: #ff00ff;
      font-weight: 600;
      letter-spacing: 2px;
      margin-top: 10px;
    }

    /* STATUS BOX */
    .status-box {
      margin: 30px auto;
      max-width: 520px;
      padding: 30px;
      border-radius: 20px;
      border: 2px solid #00ff88;
      background: rgba(0, 255, 136, 0.06);
      box-shadow: 0 0 35px rgba(0, 255, 136, 0.25);
    }

    .badge {
      display: inline-block;
      background: #00ff88;
      color: #000;
      padding: 6px 18px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    #coinDisplay {
      font-size: clamp(2.5rem, 5vw, 3.8rem);
      margin: 15px 0;
      font-weight: 700;
      font-family: "Courier New", monospace;
      text-shadow: 0 0 22px #00ff88;
    }

    .progress {
      height: 10px;
      background: #111;
      border-radius: 10px;
      border: 1px solid #333;
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #00ff88, #00f2ff);
    }

    /* COIN */
    .coin-wrapper {
      margin: 50px auto;
      perspective: 1200px;
    }

    .coin-img {
      width: min(260px, 70vw);
      animation: spin 7s linear infinite;
      filter: drop-shadow(0 0 35px #00f2ff);
    }

    @keyframes spin {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }

    /* BUTTONS */
    .btn-group {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin: 35px 0;
    }

    .btn {
      padding: 15px 42px;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s ease;
    }
