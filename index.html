<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zanon Network (Ž) | Official</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  background:radial-gradient(circle at top,#001a1a 0%,#000 70%);
  color:#fff;
  font-family:"Segoe UI",Arial,sans-serif;
  overflow-x:hidden;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:30px;
  text-align:center;
}

/* HEADER */
header h1{
  color:#00f2ff;
  letter-spacing:6px;
  font-size:clamp(2rem,4vw,3rem);
}
header p{
  color:#ff00ff;
  margin-top:12px;
  letter-spacing:2px;
  font-weight:600;
}

/* STATUS */
.status-box{
  margin:35px auto;
  max-width:540px;
  padding:30px;
  border-radius:22px;
  border:2px solid #00ff88;
  background:rgba(0,255,136,0.06);
  box-shadow:0 0 40px rgba(0,255,136,.25);
}

.badge{
  background:#00ff88;
  color:#000;
  padding:6px 20px;
  border-radius:14px;
  font-weight:800;
  font-size:12px;
}

#coinDisplay{
  font-size:3rem;
  margin:18px 0;
  font-family:"Courier New",monospace;
  text-shadow:0 0 25px #00ff88;
}
